version: 2

updates:
  # Rust dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "area: ci"
      - "size: XS"
    ignore:
      # Ignore patch updates for stable crates — only want minor/major alerts
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Python SDK dependencies
  - package-ecosystem: pip
    directory: "/sdk/python"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "area: sdk"
      - "size: XS"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "area: ci"
      - "size: XS"

  # Node.js (docs site)
  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "area: docs"
      - "size: XS"
