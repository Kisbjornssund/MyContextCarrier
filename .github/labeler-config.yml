# Auto-labeling rules for PRs based on changed file paths

"area: core":
  - changed-files:
    - any-glob-to-any-file: "crates/mycontextport-core/**"
    - any-glob-to-any-file: "crates/mycontextport-store/**"
    - any-glob-to-any-file: "crates/mycontextport-graph/**"

"area: mcp":
  - changed-files:
    - any-glob-to-any-file: "crates/mycontextport-mcp/**"

"area: privacy-engine":
  - changed-files:
    - any-glob-to-any-file: "crates/mycontextport-privacy/**"

"area: cli":
  - changed-files:
    - any-glob-to-any-file: "crates/mycontextport-cli/**"

"area: sdk":
  - changed-files:
    - any-glob-to-any-file: "sdk/python/**"

"collector: new":
  - changed-files:
    - any-glob-to-any-file: "collectors/**"

"area: ui":
  - changed-files:
    - any-glob-to-any-file: "ui/**"

"area: docs":
  - changed-files:
    - any-glob-to-any-file: "docs/**"
    - any-glob-to-any-file: "*.md"

"area: ci":
  - changed-files:
    - any-glob-to-any-file: ".github/**"
    - any-glob-to-any-file: "scripts/**"

"size: XS":
  - changed-files:
    - any-glob-to-any-file: "**"
  # Note: size labels are better assigned manually or via a dedicated size-labeler action
  # This config file handles path-based labels only
