name: Bug Report
description: Report a bug or unexpected behavior in MyContextPort
labels: ["bug", "needs review"]
body:
  - type: checkboxes
    attributes:
      label: Before you file this issue
      options:
        - label: I have searched existing issues and this has not been reported
          required: true
        - label: I have checked the documentation at docs.mycontextport.dev
          required: false

  - type: input
    id: version
    attributes:
      label: MyContextPort version
      description: Run `mycontextport --version` to find this
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (other)
        - Windows
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - curl install script
        - Docker
        - Built from source
        - Homebrew
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component affected
      multiple: true
      options:
        - Core daemon
        - MCP server
        - CLI
        - Browser collector
        - Notes/Markdown collector
        - Calendar collector
        - GitHub collector
        - Python SDK
        - Desktop UI
        - Install script
        - Other collector
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what the bug is
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `mycontextport init`
        2. Run `mycontextport collector add browser`
        3. Run `mycontextport inspect`
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run `mycontextport log --debug` and paste relevant output here
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or configuration that might help
