name: Install Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "crates/contextgenos-cli/**"
      - "crates/contextgenos-core/**"
      - "crates/contextgenos-mcp/**"

jobs:
  smoke-macos:
    name: Smoke test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --package contextgenos-cli --release

      - name: Verify binary runs
        run: |
          ./target/release/contextgenos --version
          ./target/release/contextgenos --help

      - name: Verify init command works
        run: |
          ./target/release/contextgenos init --non-interactive
          ./target/release/contextgenos status

      - name: Verify MCP server starts and responds
        run: |
          ./target/release/contextgenos mcp serve --port 8765 &
          sleep 2
          curl -sf http://localhost:8765/health || (echo "MCP server did not start" && exit 1)
          kill %1 2>/dev/null || true

  smoke-linux:
    name: Smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --package contextgenos-cli --release

      - name: Verify binary runs
        run: |
          ./target/release/contextgenos --version
          ./target/release/contextgenos --help

      - name: Verify init command works
        run: |
          ./target/release/contextgenos init --non-interactive
          ./target/release/contextgenos status

      - name: Verify MCP server starts and responds
        run: |
          ./target/release/contextgenos mcp serve --port 8765 &
          sleep 2
          curl -sf http://localhost:8765/health || (echo "MCP server did not start" && exit 1)
          kill %1 2>/dev/null || true
