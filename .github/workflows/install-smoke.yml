name: Install Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - "crates/mycontextport-cli/**"
      - "crates/mycontextport-core/**"
      - "crates/mycontextport-mcp/**"

jobs:
  smoke-macos:
    name: Smoke test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --package mycontextport-cli --release

      - name: Verify binary runs
        run: |
          ./target/release/mycontextport --version
          ./target/release/mycontextport --help

      - name: Verify init command works
        run: |
          ./target/release/mycontextport init --non-interactive
          ./target/release/mycontextport status

      # MCP server health check skipped — mcp serve is not yet implemented

  smoke-linux:
