name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: mycontextport-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: mycontextport-linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: mycontextport-macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: mycontextport-macos-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: mycontextport-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --package mycontextport-cli --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --package mycontextport-cli --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: matrix.runner != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/mycontextport ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Rename artifact (Windows)
        if: matrix.runner == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\mycontextport.exe ${{ matrix.artifact }}
          (Get-FileHash ${{ matrix.artifact }}).Hash > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: MyContextPort ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: artifacts/**/*
          generate_release_notes: true
